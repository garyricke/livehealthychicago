<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Form Submissions — Live Healthy Chicago</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon-portal.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--navy:#1B365D;--blue:#46B7E5;--teal:#48C9B0;--red:#E5202F;--yellow:#FFB81C;--gray:#6b7e89;--bg:#F7FAFC;--edge:#dbe7f0;--charcoal:#2D2D2D;--green:#28A745;}
    body{font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--navy);background:var(--bg);line-height:1.55;}
    h1,h2,h3{font-family:'Montserrat',sans-serif;}

    /* LOGIN */
    #login{position:fixed;inset:0;z-index:1000;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:24px;}
    #login .box{background:#fff;border-radius:16px;padding:30px 28px;width:100%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35);}
    #login h2{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:4px;}
    #login p{font-size:12.5px;color:var(--gray);margin-bottom:16px;}
    #login input{width:100%;border:1.5px solid var(--edge);border-radius:10px;padding:12px 13px;font-size:14px;font-family:'Poppins',sans-serif;color:var(--charcoal);margin-bottom:10px;}
    #login input:focus{outline:2px solid var(--blue);outline-offset:0;border-color:var(--blue);}
    #login button{width:100%;border:none;border-radius:10px;background:var(--navy);color:#fff;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;}
    #login button:disabled{opacity:.6;cursor:default;}
    #login .err{color:var(--red);font-size:12px;font-weight:600;min-height:16px;margin-bottom:4px;}
    .shake{animation:shake .4s;}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

    /* APP */
    .wrap{max-width:1040px;margin:0 auto;padding:28px 18px 70px;}
    .head{background:var(--navy);border-radius:16px;padding:24px 28px;color:#fff;position:relative;overflow:hidden;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
    .head::after{content:'';position:absolute;top:-70px;right:-70px;width:200px;height:200px;border-radius:50%;background:var(--teal);opacity:.12;}
    .head .eyebrow{color:var(--blue);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
    .head h1{color:#fff;font-size:23px;font-weight:800;letter-spacing:-.4px;}
    .head .meta{color:#cfe1ef;font-size:12.5px;margin-top:5px;}
    .signout{position:relative;z-index:1;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;}
    .signout:hover{background:rgba(255,255,255,.24);}

    .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
    .controls select,.controls input[type=search]{border:1.5px solid var(--edge);border-radius:10px;padding:9px 12px;font-size:13px;font-family:'Poppins',sans-serif;color:var(--charcoal);background:#fff;}
    .controls input[type=search]{flex:1;min-width:180px;}
    .controls select:focus,.controls input:focus{outline:2px solid var(--blue);outline-offset:0;border-color:var(--blue);}
    .btn{border:none;border-radius:10px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;display:inline-flex;align-items:center;gap:7px;}
    .btn-primary{background:var(--navy);color:#fff;}
    .btn-ghost{background:#fff;color:var(--navy);border:1.5px solid var(--edge);}
    .btn:disabled{opacity:.5;cursor:default;}
    .count{font-size:12.5px;color:var(--gray);font-weight:600;margin-left:auto;}

    .empty{border:1.5px dashed rgba(0,0,0,.16);border-radius:14px;padding:46px 24px;text-align:center;color:var(--gray);font-size:14px;}
    .err-banner{background:#FFF0F0;border:1px solid rgba(229,32,47,.3);color:var(--red);border-radius:10px;padding:12px 15px;font-size:13px;font-weight:600;margin-bottom:16px;}

    .sub{background:#fff;border:1px solid var(--edge);border-radius:13px;padding:15px 18px;margin-bottom:12px;box-shadow:0 1px 5px rgba(15,61,87,.05);}
    .sub-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
    .form-badge{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#0d6a8f;background:rgba(70,183,229,.14);border-radius:20px;padding:3px 11px;}
    .sub-date{font-size:12px;color:var(--gray);font-weight:600;}
    .fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px 18px;}
    .field{font-size:13px;}
    .field .k{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);}
    .field .v{color:var(--charcoal);word-break:break-word;white-space:pre-wrap;}
    .field .v a{color:var(--blue);}
    @media(max-width:600px){.head{padding:20px;} .fields{grid-template-columns:1fr;}}
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login">
    <div class="box" id="loginbox">
      <h2>Form Submissions</h2>
      <p>Admin access only — sign in to view.</p>
      <div class="err" id="loginerr"></div>
      <input type="password" id="pw" placeholder="Admin password" autocomplete="current-password" />
      <button id="loginbtn">Sign in</button>
    </div>
  </div>

  <!-- APP -->
  <main class="wrap" id="app" hidden>
    <div class="head">
      <div>
        <div class="eyebrow">Live Healthy Chicago</div>
        <h1>Form Submissions</h1>
        <div class="meta" id="meta">Loading…</div>
      </div>
      <button class="signout" id="signout">Sign out</button>
    </div>

    <div id="errbox"></div>

    <div class="controls">
      <select id="formfilter"><option value="">All forms</option></select>
      <input type="search" id="search" placeholder="Search name, email, message…" />
      <button class="btn btn-ghost" id="refresh">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
      <button class="btn btn-primary" id="export">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
      <span class="count" id="count"></span>
    </div>

    <div id="list"></div>
  </main>

  <script>
    const SUPABASE_URL = 'https://vwsvqtohkxmnzjzohtql.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_zi_6ms67MjfNXKLMrBvCNg_wgiWKYnj'; // publishable (browser-safe)
    const ADMIN_EMAIL  = 'admin@livehealthychi.com';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const $ = id => document.getElementById(id);
    let ALL = [];

    function fmtDate(s){
      if(!s) return '';
      const d = new Date(s);
      return d.toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
    }
    function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
    function linkify(v){
      const s = esc(v);
      if(/^https?:\/\//i.test(v)) return `<a href="${s}" target="_blank" rel="noopener">${s}</a>`;
      if(/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v)) return `<a href="mailto:${s}">${s}</a>`;
      return s;
    }

    // ── Auth ──────────────────────────────────────────────
    function showApp(){ $('login').style.display='none'; $('app').hidden=false; load(); }
    sb.auth.getSession().then(({data})=>{ if(data.session) showApp(); });

    async function signIn(){
      const btn = $('loginbtn'); btn.disabled=true; $('loginerr').textContent='';
      const { error } = await sb.auth.signInWithPassword({ email: ADMIN_EMAIL, password: $('pw').value });
      btn.disabled=false;
      if(error){
        $('loginerr').textContent = 'Incorrect password.';
        const b=$('loginbox'); b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake'); $('pw').select();
      } else { showApp(); }
    }
    $('loginbtn').addEventListener('click', signIn);
    $('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') signIn(); });
    $('signout').addEventListener('click', async ()=>{ await sb.auth.signOut(); location.reload(); });

    // ── Load + render ─────────────────────────────────────
    async function load(){
      $('errbox').innerHTML=''; $('meta').textContent='Loading…';
      const { data, error } = await sb.from('submissions').select('*').order('submitted_at',{ascending:false});
      if(error){
        $('meta').textContent='';
        $('errbox').innerHTML = `<div class="err-banner">Couldn't load submissions: ${esc(error.message)}. (Has the <code>submissions</code> table been created?)</div>`;
        $('list').innerHTML=''; return;
      }
      ALL = data || [];
      const forms = [...new Set(ALL.map(r=>r.form_name))].sort();
      const sel = $('formfilter'); sel.innerHTML = '<option value="">All forms</option>' + forms.map(f=>`<option value="${esc(f)}">${esc(f)}</option>`).join('');
      $('meta').textContent = `${ALL.length} total submission${ALL.length===1?'':'s'} across ${forms.length} form${forms.length===1?'':'s'}`;
      render();
    }

    function filtered(){
      const f = $('formfilter').value;
      const q = $('search').value.trim().toLowerCase();
      return ALL.filter(r=>{
        if(f && r.form_name!==f) return false;
        if(!q) return true;
        const hay = (r.form_name+' '+JSON.stringify(r.data||{})).toLowerCase();
        return hay.includes(q);
      });
    }

    function render(){
      const rows = filtered();
      $('count').textContent = `${rows.length} shown`;
      if(rows.length===0){ $('list').innerHTML = `<div class="empty">No submissions${ALL.length?' match this filter':' yet'}.</div>`; return; }
      $('list').innerHTML = rows.map(r=>{
        const data = r.data || {};
        const fields = Object.keys(data).filter(k=>data[k]!=null && String(data[k]).trim()!=='').map(k=>
          `<div class="field"><div class="k">${esc(k)}</div><div class="v">${linkify(data[k])}</div></div>`).join('');
        return `<div class="sub">
          <div class="sub-top">
            <span class="form-badge">${esc(r.form_name)}</span>
            <span class="sub-date">${esc(fmtDate(r.submitted_at||r.created_at))}</span>
          </div>
          <div class="fields">${fields || '<div class="field"><div class="v" style="color:var(--gray)">No fields</div></div>'}</div>
        </div>`;
      }).join('');
    }

    $('formfilter').addEventListener('change', render);
    $('search').addEventListener('input', render);
    $('refresh').addEventListener('click', load);

    // ── CSV export (current filter) ───────────────────────
    function csvCell(v){ const s=String(v==null?'':v); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
    $('export').addEventListener('click', ()=>{
      const rows = filtered();
      if(!rows.length) return;
      const keys = [...new Set(rows.flatMap(r=>Object.keys(r.data||{})))];
      const header = ['form','submitted_at',...keys];
      const lines = [header.map(csvCell).join(',')];
      rows.forEach(r=>{
        const d = r.data||{};
        lines.push([r.form_name, r.submitted_at||r.created_at, ...keys.map(k=>d[k]==null?'':d[k])].map(csvCell).join(','));
      });
      const blob = new Blob([lines.join('\n')], {type:'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const f = $('formfilter').value || 'all-forms';
      a.download = `lhc-submissions-${f}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
</html>
