<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Celebrate the Check — Live Healthy Chicago</title>
  <meta name="description" content="You just took a step toward a healthier Chicago. Celebrate the check." />
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dsbllwpbh/image/upload/v1771612857/favicon-live-healthy-chicago_e7o6el.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Open+Sans:wght@400;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow-x: hidden; max-width: 100vw; }
    body {
      font-family: 'Open Sans', system-ui, sans-serif;
      background: #0F1E35;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .font-heading { font-family: 'Montserrat', sans-serif; }
    .font-label { font-family: 'Poppins', sans-serif; }

    .view-enter { animation: fadeUp 0.5s ease-out both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pop-in { animation: pop 0.6s cubic-bezier(.2,1.4,.5,1) both; }
    @keyframes pop {
      0%   { opacity: 0; transform: scale(0.6); }
      60%  { opacity: 1; transform: scale(1.08); }
      100% { opacity: 1; transform: scale(1); }
    }

    .flag-bar {
      opacity: 0;
      animation: flagIn 0.6s ease-out forwards;
    }
    @keyframes flagIn {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 0.9; transform: scaleX(1); }
    }

    .star {
      opacity: 0;
      transform: scale(0);
      animation: starIn 0.5s cubic-bezier(.2,1.6,.4,1) forwards;
    }
    @keyframes starIn {
      to { opacity: 1; transform: scale(1); }
    }

    .progress-fill {
      transition: width 1.8s cubic-bezier(.3,.8,.3,1);
    }

    input[type="text"], input[type="email"], input[type="tel"] {
      -webkit-appearance: none;
      appearance: none;
    }

    /* Heart buddy mascot */
    .heart-idle   { animation: heartBob 2.6s ease-in-out infinite; transform-origin: 50% 90%; }
    .heart-bounce { animation: heartBounce 0.55s cubic-bezier(.2,1.5,.4,1); transform-origin: 50% 90%; }
    .heart-cheer  { animation: heartCheer 0.8s cubic-bezier(.2,1.4,.4,1); transform-origin: 50% 90%; }
    @keyframes heartBob    { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-4px) rotate(-2deg); } }
    @keyframes heartBounce { 0% { transform: translateY(0) scale(1); } 35% { transform: translateY(-14px) scale(1.08); } 100% { transform: translateY(0) scale(1); } }
    @keyframes heartCheer  { 0% { transform: translateY(0) scale(1) rotate(0); } 30% { transform: translateY(-18px) scale(1.12) rotate(-6deg); } 60% { transform: translateY(-5px) scale(1.05) rotate(6deg); } 100% { transform: translateY(0) scale(1) rotate(0); } }

    .speech-bubble { animation: bubblePop 0.4s cubic-bezier(.2,1.4,.5,1) both; }
    @keyframes bubblePop { 0% { opacity: 0; transform: translateY(6px) scale(0.92); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

    @media (prefers-reduced-motion: reduce) {
      .view-enter, .pop-in, .flag-bar, .star,
      .heart-idle, .heart-bounce, .heart-cheer, .speech-bubble { animation: none !important; opacity: 1 !important; transform: none !important; }
      .progress-fill { transition: none !important; }
    }
  </style>
</head>
<body>

  <!-- Hidden static forms for Netlify crawler detection -->
  <form name="celebrate-survey" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="first_name" />
    <input type="text" name="location" />
    <input type="text" name="heard_about" />
    <input type="text" name="motivation" />
    <input type="text" name="feeling_after" />
    <input type="text" name="helpful_info" />
    <input type="text" name="better_experience" />
    <input type="text" name="next_step" />
    <input type="text" name="consent_share" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="text" name="bot-field" />
  </form>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useLayoutEffect, useRef, useMemo, useCallback } = React;

    // ── Palette (Chicago flag + LHC navy) ─────────────────────────────
    const C = {
      navy:    '#0F1E35',
      navy2:   '#1A2D4E',
      blue:    '#418FDE',
      blueLt:  '#7BB5E8',
      red:     '#DA291C',
      redLt:   '#FF6B6B',
      white:   '#FFFFFF',
      yellow:  '#F5B400',
      muted:   'rgba(255,255,255,0.65)',
      faint:   'rgba(255,255,255,0.10)',
    };

    const COUNTER_BASE = 500;
    const MONTH_BASE   = 87;
    const GOAL         = 25000;
    const LOGO_URL     = 'https://assets.codepen.io/3457845/logo-Live-Healthy-Chicago.png';

    // Counter is paused while the comms committee trials the flow.
    // Real start date + starting number land here once we go live.
    const getCount  = () => ({ total: COUNTER_BASE, month: MONTH_BASE });
    const bumpCount = () => ({ total: COUNTER_BASE, month: MONTH_BASE });

    // ── Raffle gating ─────────────────────────────────────────────────
    // Email + phone are only collected for the monthly gift-card raffle.
    // Raffle copy is paused pending Rush legal review, so these fields
    // stay hidden until this flips to true. Survey data is still captured.
    const RAFFLE_ENABLED = false;

    // ── Survey options (Lisa's expanded set, informed by the CAB) ─────
    const HEARD_OPTIONS = ['Family or friend', 'Social media', 'Church', 'Community org', 'A provider', 'The website', 'Other'];
    const FEELING_OPTIONS = [
      { val: 'Empowered',   face: 'laugh' },
      { val: 'Less scared', face: 'smile' },
      { val: 'Concerned',   face: 'meh' },
      { val: 'Worried',     face: 'frown' },
    ];
    const NEXTSTEP_OPTIONS = [
      'Make an appointment with my provider',
      'Come back in two weeks for a recheck',
      'Keep watching it at home',
      'Not sure yet',
    ];
    const HEART_CHEERS = ['Nice!', 'Love that!', 'Heck yes!', 'Keep going!', 'So good!', "You're the best!"];
    const randomCheer = () => HEART_CHEERS[Math.floor(Math.random() * HEART_CHEERS.length)];

    // ── Heart buddy voice clips (ElevenLabs) ──────────────────────────
    const AUDIO_BASE = 'assets/celebrate-audio/';
    const SOUNDS = {
      greeting:   ['hi-ill-cheer-you-on'],
      cheer:      ['nice', 'love-that', 'heck-yes', 'heck-yeah', 'keep-going', 'keep-going-my-friend', 'so-good', 'youre-the-best', 'youre-the-best-seriously'],
      why:        ['thats-your-why'],
      feeling:    ['thanks-for-sharing'],
      better:     ['good-to-know-thankyou'],
      plan:       ['love-that-plan'],
      consentYes: ['thank-you'],
      consentNo:  ['totally-okay', 'totally-ohhhh-kay'],
      complete:   ['you-answered-them-all', 'you-answered-them-all-i-heart-you'],
      sending:    ['sending-it-in', 'sending-it-in-yipeeee', 'is-that-your-final-answer-ha-ha-it-looks-great'],
    };
    let voiceAudio = null;
    const lastVoice = {};
    const playVoice = (key, muted) => {
      if (muted || !key) return;
      const pool = SOUNDS[key];
      if (!pool || !pool.length) return;
      let clip = pool[0];
      if (pool.length > 1) {
        let n = 0;
        do { clip = pool[Math.floor(Math.random() * pool.length)]; } while (clip === lastVoice[key] && ++n < 8);
      }
      lastVoice[key] = clip;
      try {
        if (voiceAudio) voiceAudio.pause();      // never stack voices
        voiceAudio = new Audio(AUDIO_BASE + clip + '.mp3');
        voiceAudio.volume = 0.95;
        voiceAudio.play().catch(() => {});
      } catch (e) { /* noop */ }
    };

    // ── Web Audio fanfare (royalty-free: synthesized here) ────────────
    let audioCtx = null;
    const getCtx = () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    };

    const playSynthFanfare = (muted) => {
      if (muted) return;
      try {
        const ctx = getCtx();
        const now = ctx.currentTime;
        // Ascending party-horn pattern: G4 C5 E5 G5 ... with slight overlap
        const notes = [392, 523, 659, 784];
        notes.forEach((freq, i) => {
          const t = now + i * 0.13;
          // Horn = sawtooth + square mixed for bright tone
          [['sawtooth', 0.22], ['square', 0.08]].forEach(([type, amp]) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(amp, t + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(t); osc.stop(t + 0.42);
          });
        });
        // Final shimmer chord
        const shimmer = now + 0.55;
        [784, 988, 1175].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, shimmer);
          gain.gain.linearRampToValueAtTime(0.14, shimmer + 0.04);
          gain.gain.exponentialRampToValueAtTime(0.001, shimmer + 0.9);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(shimmer); osc.stop(shimmer + 1.0);
        });
      } catch (e) { /* noop */ }
    };

    // Designed fanfare (ElevenLabs) for name submit; falls back to the
    // synth horn if the file can't load or autoplay is blocked.
    let fanfareAudio = null;
    const playFanfare = (muted) => {
      if (muted) return;
      try {
        if (fanfareAudio) fanfareAudio.pause();
        fanfareAudio = new Audio(AUDIO_BASE + 'celebrate-fanfare.mp3');
        fanfareAudio.volume = 0.85;
        fanfareAudio.addEventListener('error', () => playSynthFanfare(muted), { once: true });
        const p = fanfareAudio.play();
        if (p && p.catch) p.catch(() => playSynthFanfare(muted));
      } catch (e) {
        playSynthFanfare(muted);
      }
    };

    const playPing = (muted) => {
      if (muted) return;
      try {
        const ctx = getCtx();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = 1046;
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.15, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now); osc.stop(now + 0.45);
      } catch (e) { /* noop */ }
    };

    // ── Confetti ──────────────────────────────────────────────────────
    const reducedMotion = () => window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const fireConfetti = (intensity = 'big') => {
      if (!window.confetti || reducedMotion()) return;
      const colors = [C.blue, C.red, C.white, C.blueLt];
      const base = { spread: 80, ticks: 240, gravity: 0.9, scalar: 1.05, colors };
      if (intensity === 'small') {
        window.confetti({ ...base, particleCount: 80, origin: { x: 0.5, y: 0.6 } });
        return;
      }
      window.confetti({ ...base, particleCount: 140, angle: 60,  origin: { x: 0, y: 0.9 } });
      window.confetti({ ...base, particleCount: 140, angle: 120, origin: { x: 1, y: 0.9 } });
      setTimeout(() => {
        window.confetti({ ...base, particleCount: 110, angle: 90, origin: { x: 0.5, y: 0.2 }, startVelocity: 35 });
      }, 350);
    };

    // ── Query param for location tracking ─────────────────────────────
    const getLoc = () => {
      try {
        const p = new URLSearchParams(window.location.search);
        return (p.get('loc') || '').slice(0, 40);
      } catch (e) { return ''; }
    };

    // ── Netlify form submit ───────────────────────────────────────────
    const submitNetlify = (formName, data) => {
      return fetch('/celebrate.html', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ 'form-name': formName, 'bot-field': '', ...data }).toString(),
      });
    };

    const nf = (n) => new Intl.NumberFormat('en-US').format(n);

    // ── Chicago flag background (decorative) ──────────────────────────
    const FlagBackdrop = ({ intense }) => (
      <div className="absolute inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
        <div className="absolute inset-0"
             style={{ background: `radial-gradient(ellipse at 50% 0%, ${C.navy2} 0%, ${C.navy} 70%)` }} />
        {intense && (
          <>
            <div className="flag-bar absolute left-0 right-0"
                 style={{ top: '28%', height: '7%', background: C.blue, transformOrigin: 'left', animationDelay: '0.05s' }} />
            <div className="flag-bar absolute left-0 right-0"
                 style={{ top: '65%', height: '7%', background: C.blue, transformOrigin: 'right', animationDelay: '0.2s' }} />
            <div className="absolute inset-0 flex items-center justify-around px-8" style={{ top: '42%', height: '16%' }}>
              {[0,1,2,3].map(i => (
                <Star key={i} delay={0.45 + i * 0.1} />
              ))}
            </div>
          </>
        )}
      </div>
    );

    const Star = ({ delay }) => (
      <svg viewBox="0 0 100 100" className="star"
           style={{ width: '14%', maxWidth: 72, minWidth: 28, animationDelay: `${delay}s`, filter: `drop-shadow(0 2px 6px rgba(218,41,28,0.4))` }}>
        <polygon points="50,5 61,39 96,39 68,60 79,94 50,73 21,94 32,60 4,39 39,39"
                 fill={C.red} />
      </svg>
    );

    // ── Mute toggle ───────────────────────────────────────────────────
    const MuteButton = ({ muted, setMuted }) => (
      <button onClick={() => setMuted(m => !m)}
              aria-label={muted ? 'Unmute' : 'Mute'}
              className="fixed top-4 right-4 z-50 w-11 h-11 rounded-full flex items-center justify-center transition-colors"
              style={{ background: 'rgba(0,0,0,0.35)', border: `1px solid ${C.faint}`, color: C.white }}>
        {muted ? (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707A1 1 0 0112 5v14a1 1 0 01-1.707.707L5.586 15zM17 9l4 6m0-6l-4 6"/>
          </svg>
        ) : (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707A1 1 0 0112 5v14a1 1 0 01-1.707.707L5.586 15zM15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728"/>
          </svg>
        )}
      </button>
    );

    // ── Screens ───────────────────────────────────────────────────────

    const EntryView = ({ name, setName, onGo, locLabel }) => {
      const canGo = name.trim().length > 0;
      return (
        <div className="view-enter relative min-h-[100dvh] flex flex-col items-center justify-center px-6 py-10">
          <FlagBackdrop />
          <div className="relative z-10 w-full max-w-md text-center">
            <img src={LOGO_URL} alt="Live Healthy Chicago"
                 className="mx-auto mb-8 opacity-90" style={{ height: 56 }} />
            {locLabel && (
              <div className="inline-block text-xs font-label tracking-wider uppercase px-3 py-1 rounded-full mb-6"
                   style={{ background: 'rgba(245,180,0,0.14)', border: `1px solid ${C.yellow}40`, color: C.yellow }}>
                checking in from {locLabel}
              </div>
            )}
            <h1 className="font-heading font-black text-5xl sm:text-6xl leading-tight mb-4"
                style={{ letterSpacing: '-0.02em' }}>
              Celebrate<br/>the Check!
            </h1>
            <p className="text-lg mb-10" style={{ color: C.muted }}>
              You just took a step toward a healthier Chicago. Tell us your first name — we want to cheer you on.
            </p>

            <form onSubmit={(e) => { e.preventDefault(); if (canGo) onGo(); }}>
              <input type="text"
                     value={name}
                     onChange={e => setName(e.target.value.slice(0, 24))}
                     placeholder="First name"
                     autoFocus
                     autoComplete="given-name"
                     className="w-full px-5 py-4 rounded-2xl text-center text-lg font-label font-semibold mb-4 focus:outline-none transition-all"
                     style={{
                       background: 'rgba(255,255,255,0.06)',
                       border: `1px solid ${canGo ? C.blue : C.faint}`,
                       color: C.white,
                     }} />
              <button type="submit"
                      disabled={!canGo}
                      className="w-full py-4 rounded-2xl font-heading font-extrabold text-lg tracking-wide transition-all"
                      style={{
                        background: canGo ? `linear-gradient(135deg, ${C.red} 0%, #B01E15 100%)` : 'rgba(255,255,255,0.08)',
                        color: canGo ? C.white : 'rgba(255,255,255,0.4)',
                        boxShadow: canGo ? '0 10px 30px rgba(218,41,28,0.35)' : 'none',
                        cursor: canGo ? 'pointer' : 'not-allowed',
                      }}>
                LET'S GO →
              </button>
            </form>

            <p className="text-xs mt-8" style={{ color: 'rgba(255,255,255,0.45)' }}>
              We only keep your first name — nothing else.
            </p>
          </div>
        </div>
      );
    };

    const CelebrateView = ({ name, onNext }) => {
      useEffect(() => {
        const t = setTimeout(onNext, 4200);
        return () => clearTimeout(t);
      }, [onNext]);
      return (
        <div className="view-enter relative min-h-[100dvh] flex flex-col items-center justify-center px-6 py-10 overflow-hidden">
          <FlagBackdrop intense />
          <div className="relative z-10 text-center">
            <div className="pop-in" style={{ animationDelay: '0.25s' }}>
              <div className="font-label uppercase tracking-[0.3em] text-sm mb-5" style={{ color: C.yellow }}>
                Thanks,
              </div>
              <h1 className="font-heading font-black leading-none mb-6"
                  style={{
                    fontSize: 'clamp(3rem, 14vw, 7rem)',
                    color: C.white,
                    textShadow: '0 4px 30px rgba(65,143,222,0.5)',
                    letterSpacing: '-0.03em',
                  }}>
                {name}!
              </h1>
              <p className="text-2xl sm:text-3xl font-heading font-bold mb-3">
                You did it. 🎉
              </p>
              <p className="text-lg" style={{ color: C.muted }}>
                You're helping make Chicago healthier.
              </p>
            </div>
          </div>
        </div>
      );
    };

    const ImpactView = ({ name, count, onSurvey, onDone }) => {
      const [shown, setShown] = useState(count.total - 120); // start below, count up
      useEffect(() => {
        let raf, start;
        const from = count.total - 120;
        const to = count.total;
        const dur = 1600;
        const step = (ts) => {
          if (!start) start = ts;
          const p = Math.min(1, (ts - start) / dur);
          const eased = 1 - Math.pow(1 - p, 3);
          setShown(Math.round(from + (to - from) * eased));
          if (p < 1) raf = requestAnimationFrame(step);
        };
        raf = requestAnimationFrame(step);
        return () => cancelAnimationFrame(raf);
      }, [count.total]);

      const pct = Math.min(100, (count.total / GOAL) * 100);

      return (
        <div className="view-enter relative min-h-[100dvh] flex flex-col items-center justify-center px-6 py-10">
          <FlagBackdrop />
          <div className="relative z-10 w-full max-w-md text-center">
            <p className="font-label uppercase tracking-[0.25em] text-xs mb-4" style={{ color: C.yellow }}>
              Every check counts
            </p>
            <h2 className="font-heading font-black text-3xl sm:text-4xl leading-tight mb-8"
                style={{ letterSpacing: '-0.02em' }}>
              Healthier Chicago,<br/>
              <span style={{ color: C.blueLt }}>one blood pressure at a time.</span>
            </h2>

            <div className="rounded-3xl px-6 py-8 mb-6"
                 style={{ background: 'rgba(255,255,255,0.05)', border: `1px solid ${C.faint}` }}>
              <div className="font-heading font-black leading-none mb-2"
                   style={{ fontSize: 'clamp(3rem, 12vw, 5rem)', color: C.white }}>
                {nf(shown)}
              </div>
              <div className="font-label text-sm tracking-wide mb-6" style={{ color: C.muted }}>
                checks and counting
              </div>

              <div className="h-2 rounded-full overflow-hidden mb-2" style={{ background: 'rgba(255,255,255,0.08)' }}>
                <div className="progress-fill h-full rounded-full"
                     style={{ width: `${pct}%`, background: `linear-gradient(90deg, ${C.blue}, ${C.red})` }} />
              </div>
              <div className="flex justify-between text-xs font-label" style={{ color: 'rgba(255,255,255,0.55)' }}>
                <span>{nf(count.month)} this month</span>
                <span>goal: {nf(GOAL)}</span>
              </div>
            </div>

            <button onClick={onSurvey}
                    className="w-full py-4 rounded-2xl font-heading font-extrabold text-base tracking-wide mb-3 transition-all"
                    style={{
                      background: `linear-gradient(135deg, ${C.red} 0%, #B01E15 100%)`,
                      color: C.white,
                      boxShadow: '0 10px 30px rgba(218,41,28,0.3)',
                    }}>
              TELL US ABOUT YOUR CHECK →
            </button>
            <p className="text-xs mb-4" style={{ color: 'rgba(255,255,255,0.5)' }}>
              A few quick questions — and a buddy to cheer you on 💙
            </p>
            <button onClick={onDone}
                    className="text-sm underline"
                    style={{ color: 'rgba(255,255,255,0.55)' }}>
              No thanks, I'm done
            </button>
          </div>
        </div>
      );
    };

    // ── Reactive heart mascot ─────────────────────────────────────────
    const HeartBuddy = ({ mood, tick }) => {
      const excited = mood === 'cheer';
      const animClass = mood === 'cheer' ? 'heart-cheer' : mood === 'bounce' ? 'heart-bounce' : 'heart-idle';
      return (
        <div key={tick} className="shrink-0" style={{ width: 56, height: 56 }}>
          <div className={animClass}>
            <svg width="56" height="56" viewBox="0 0 100 100" aria-hidden="true">
              {/* arms */}
              <line x1="26" y1="52" x2="16" y2="52" stroke={C.red} strokeWidth="6" strokeLinecap="round" />
              <line x1="74" y1="52" x2="84" y2="52" stroke={C.red} strokeWidth="6" strokeLinecap="round" />
              {/* gloves */}
              <circle cx="13" cy="52" r="8" fill={C.white} />
              <circle cx="87" cy="52" r="8" fill={C.white} />
              {/* heart body */}
              <path d="M50 84 C50 84 14 60 14 37 C14 24 24 16 34 16 C42 16 47 21 50 26 C53 21 58 16 66 16 C76 16 86 24 86 37 C86 60 50 84 50 84 Z" fill={C.red} />
              {/* cheeks */}
              <circle cx="31" cy="52" r="4" fill={C.redLt} opacity="0.65" />
              <circle cx="69" cy="52" r="4" fill={C.redLt} opacity="0.65" />
              {/* eyes */}
              <circle cx="39" cy="43" r="6.5" fill={C.white} />
              <circle cx="61" cy="43" r="6.5" fill={C.white} />
              <circle cx="40" cy="44" r="3" fill={C.navy} />
              <circle cx="62" cy="44" r="3" fill={C.navy} />
              {/* mouth */}
              {excited
                ? <path d="M40 57 Q50 71 60 57 Z" fill={C.navy} />
                : <path d="M41 58 Q50 66 59 58" stroke={C.navy} strokeWidth="3" fill="none" strokeLinecap="round" />}
            </svg>
          </div>
        </div>
      );
    };

    // ── Flat face icons (lucide-style, inherit currentColor) ──────────
    const FaceIcon = ({ kind }) => {
      const mouth = {
        laugh: <path d="M18 13a6 6 0 0 1-6 5 6 6 0 0 1-6-5h12Z" />,
        smile: <path d="M8 14s1.5 2 4 2 4-2 4-2" />,
        meh:   <line x1="8" y1="15" x2="16" y2="15" />,
        frown: <path d="M16 16s-1.5-2-4-2-4 2-4 2" />,
      }[kind];
      return (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10" />
          {mouth}
          <line x1="9" y1="9" x2="9.01" y2="9" />
          <line x1="15" y1="9" x2="15.01" y2="9" />
        </svg>
      );
    };

    // ── Chip-style single choice row ──────────────────────────────────
    const ChoiceRow = ({ options, value, onPick }) => (
      <div className="flex flex-wrap gap-2">
        {options.map(opt => {
          const val = typeof opt === 'string' ? opt : opt.val;
          const face = typeof opt === 'object' ? opt.face : null;
          const on = value === val;
          return (
            <button type="button" key={val}
                    onClick={() => onPick(on ? '' : val)}
                    className="inline-flex items-center gap-1.5 px-3.5 py-2 rounded-xl text-sm font-label font-semibold transition-all"
                    style={{
                      background: on ? 'rgba(65,143,222,0.20)' : 'rgba(255,255,255,0.05)',
                      border: `1px solid ${on ? C.blue : C.faint}`,
                      color: on ? C.white : C.muted,
                    }}>
              {face && <FaceIcon kind={face} />}{val}
            </button>
          );
        })}
      </div>
    );

    const SurveyView = ({ name, muted, onSubmit, onSkip }) => {
      const [heard, setHeard]       = useState('');
      const [motivation, setMotiv]  = useState('');
      const [feeling, setFeeling]   = useState('');
      const [helpful, setHelpful]   = useState('');
      const [better, setBetter]     = useState('');
      const [nextStep, setNextStep] = useState('');
      const [consent, setConsent]   = useState('');
      const [email, setEmail]       = useState('');
      const [phone, setPhone]       = useState('');
      const [busy, setBusy]         = useState(false);

      // Reactive buddy state
      const [mood, setMood]       = useState('idle');
      const [msg, setMsg]         = useState(`Hi ${name}! I'll cheer you on 💙`);
      const [tick, setTick]       = useState(0);
      const [showBubble, setShowBubble] = useState(true);
      const [activeIdx, setActiveIdx]   = useState(0);
      const [heartTop, setHeartTop]     = useState(0);
      const moodTimer   = useRef();
      const bubbleTimer = useRef();
      const qRefs       = useRef([]);

      const react = (message, sound, big = false) => {
        if (message) setMsg(message);
        setMood(big ? 'cheer' : 'bounce');
        setTick(t => t + 1);
        setShowBubble(true);
        playVoice(sound, muted);
        clearTimeout(moodTimer.current);
        moodTimer.current = setTimeout(() => setMood('idle'), big ? 800 : 560);
        clearTimeout(bubbleTimer.current);
        bubbleTimer.current = setTimeout(() => setShowBubble(false), big ? 2600 : 2000);
      };
      useEffect(() => () => { clearTimeout(moodTimer.current); clearTimeout(bubbleTimer.current); }, []);
      useEffect(() => { playVoice('greeting', muted); }, []); // greet on open (gesture already unlocked audio)

      // Float the buddy to the question currently being answered.
      const HEART_H = 56;
      const positionHeart = () => {
        const el = qRefs.current[activeIdx];
        if (el) setHeartTop(Math.max(0, el.offsetTop + el.offsetHeight / 2 - HEART_H / 2));
      };
      const qProps = (i) => ({
        ref: (el) => { qRefs.current[i] = el; },
        onPointerDown: () => setActiveIdx(i),
        onClick: () => setActiveIdx(i),
        onFocusCapture: () => setActiveIdx(i),
      });
      useLayoutEffect(positionHeart, [activeIdx]);
      useEffect(() => {
        window.addEventListener('resize', positionHeart);
        const t = setTimeout(positionHeart, 400); // settle after fonts/layout
        return () => { window.removeEventListener('resize', positionHeart); clearTimeout(t); };
      }, [activeIdx]);

      // react when a text field goes from empty → filled
      const soundOf = (s, v) => (typeof s === 'function' ? s(v) : s);
      const txt = (cur, setter, message, sound, max = 140) => (e) => {
        const v = e.target.value.slice(0, max);
        if (!cur && v.trim()) react(message, sound);
        setter(v);
      };
      const pick = (setter, msgFor, sound) => (v) => {
        setter(v);
        if (v) react(typeof msgFor === 'function' ? msgFor(v) : msgFor, soundOf(sound, v));
      };

      const core = [heard, motivation, feeling, helpful, better, nextStep, consent];
      const answered = core.filter(v => v && v.trim()).length;
      const pct = Math.round((answered / core.length) * 100);
      const hasAny = answered > 0 || (RAFFLE_ENABLED && (email.trim() || phone.trim()));

      const prevAns = useRef(0);
      useEffect(() => {
        if (answered === core.length && answered > prevAns.current) react('You answered them all! 🎉', 'complete', true);
        prevAns.current = answered;
      }, [answered]);

      const labelCls = "block font-label font-semibold mb-2.5 text-sm";
      const inputStyle = { background: 'rgba(255,255,255,0.06)', border: `1px solid ${C.faint}`, color: C.white };
      const num = (n) => (
        <span className="inline-flex items-center justify-center w-5 h-5 rounded-full text-[11px] font-bold mr-2 align-middle"
              style={{ background: 'rgba(65,143,222,0.2)', color: C.blueLt }}>{n}</span>
      );
      const optional = <span style={{ color: C.muted, fontWeight: 400 }}>(optional)</span>;

      const handle = async (e) => {
        e.preventDefault();
        if (busy || !hasAny) return;
        setBusy(true);
        react('Sending… 🎉', 'sending', true);
        try {
          await submitNetlify('celebrate-survey', {
            first_name: name,
            location: getLoc(),
            heard_about: heard,
            motivation,
            feeling_after: feeling,
            helpful_info: helpful,
            better_experience: better,
            next_step: nextStep,
            consent_share: consent,
            ...(RAFFLE_ENABLED ? { email, phone } : {}),
          });
        } catch (err) { /* continue anyway */ }
        onSubmit();
      };

      return (
        <div className="view-enter relative min-h-[100dvh] flex flex-col px-6 py-8">
          <FlagBackdrop />
          <div className="relative z-10 w-full max-w-md mx-auto">

            {/* Progress (sticky) */}
            <div className="sticky top-3 z-20 mb-6 rounded-2xl px-4 py-3"
                 style={{ background: 'rgba(26,45,78,0.92)', backdropFilter: 'blur(10px)', border: `1px solid ${C.faint}` }}>
              <div className="flex items-center justify-between mb-2 font-label text-xs">
                <span style={{ color: C.muted }}>{answered} of {core.length} answered</span>
                <span style={{ color: C.blueLt }}>{pct}%</span>
              </div>
              <div className="h-1.5 rounded-full overflow-hidden" style={{ background: 'rgba(255,255,255,0.1)' }}>
                <div className="h-full rounded-full"
                     style={{ width: `${pct}%`, background: `linear-gradient(90deg, ${C.blue}, ${C.red})`, transition: 'width 0.4s ease' }} />
              </div>
            </div>

            {/* Floating buddy — glides to the question being answered */}
            <div className="absolute pointer-events-none"
                 style={{ top: heartTop, right: 0, width: HEART_H, zIndex: 30,
                          transition: 'top 0.45s cubic-bezier(.34,1.3,.5,1)' }}>
              {showBubble && (
                <div key={tick} className="speech-bubble absolute font-label font-semibold text-xs px-3 py-2 rounded-2xl text-center"
                     style={{ bottom: HEART_H + 6, right: 0, width: 'max-content', maxWidth: 156,
                              background: C.white, color: C.navy, boxShadow: '0 8px 22px rgba(0,0,0,0.3)' }}>
                  {msg}
                </div>
              )}
              <HeartBuddy mood={mood} tick={tick} />
            </div>

            <h2 className="font-heading font-black text-2xl sm:text-3xl mb-2" style={{ letterSpacing: '-0.02em' }}>
              Tell us about today, {name}.
            </h2>
            <p className="text-sm mb-8" style={{ color: C.muted }}>
              Answer what you like — every bit helps us serve your neighborhood better.
            </p>

            <form onSubmit={handle} className="space-y-7 pb-4 pr-16">

              <div {...qProps(0)}>
                <label className={labelCls}>{num(1)}How did you hear about today's event?</label>
                <ChoiceRow options={HEARD_OPTIONS} value={heard} onPick={pick(setHeard, randomCheer, 'cheer')} />
              </div>

              <div {...qProps(1)}>
                <label className={labelCls}>{num(2)}What made you decide to get checked today?</label>
                <input type="text" value={motivation} onChange={txt(motivation, setMotiv, "That's your why 💙", 'why', 200)}
                       placeholder="Your “why” — in a few words"
                       className="w-full px-4 py-3 rounded-xl text-base focus:outline-none" style={inputStyle} />
              </div>

              <div {...qProps(2)}>
                <label className={labelCls}>{num(3)}How do you feel after getting checked?</label>
                <ChoiceRow options={FEELING_OPTIONS} value={feeling} onPick={pick(setFeeling, 'Thanks for sharing 💙', 'feeling')} />
              </div>

              <div {...qProps(3)}>
                <label className={labelCls}>{num(4)}What information was helpful today? {optional}</label>
                <input type="text" value={helpful} onChange={txt(helpful, setHelpful, randomCheer(), 'cheer')}
                       placeholder="(optional)"
                       className="w-full px-4 py-3 rounded-xl text-base focus:outline-none" style={inputStyle} />
              </div>

              <div {...qProps(4)}>
                <label className={labelCls}>{num(5)}What could have made today better? {optional}</label>
                <input type="text" value={better} onChange={txt(better, setBetter, 'Good to know — thank you!', 'better')}
                       placeholder="(optional)"
                       className="w-full px-4 py-3 rounded-xl text-base focus:outline-none" style={inputStyle} />
              </div>

              <div {...qProps(5)}>
                <label className={labelCls}>{num(6)}After seeing your numbers, what's your next step?</label>
                <ChoiceRow options={NEXTSTEP_OPTIONS} value={nextStep} onPick={pick(setNextStep, 'Love that plan! 🙌', 'plan')} />
              </div>

              <div {...qProps(6)}>
                <label className={labelCls}>{num(7)}Is it okay to share your words to inspire others?</label>
                <ChoiceRow options={['Yes', 'No']} value={consent}
                           onPick={pick(setConsent,
                             v => v === 'Yes' ? 'Thank you! 🙌' : 'Totally okay 💙',
                             v => v === 'Yes' ? 'consentYes' : 'consentNo')} />
              </div>

              {RAFFLE_ENABLED && (
                <div>
                  <label className={labelCls}>Want us to follow up? {optional}</label>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value.slice(0, 120))}
                         placeholder="Email (optional)"
                         className="w-full px-4 py-3 rounded-xl text-base focus:outline-none mb-2" style={inputStyle} />
                  <input type="tel" value={phone} onChange={e => setPhone(e.target.value.slice(0, 30))}
                         placeholder="Phone (optional)"
                         className="w-full px-4 py-3 rounded-xl text-base focus:outline-none" style={inputStyle} />
                </div>
              )}

              <button type="submit"
                      disabled={!hasAny || busy}
                      className="w-full py-4 rounded-2xl font-heading font-extrabold text-base tracking-wide transition-all"
                      style={{
                        background: (hasAny && !busy) ? `linear-gradient(135deg, ${C.red} 0%, #B01E15 100%)` : 'rgba(255,255,255,0.08)',
                        color: (hasAny && !busy) ? C.white : 'rgba(255,255,255,0.4)',
                        boxShadow: (hasAny && !busy) ? '0 10px 30px rgba(218,41,28,0.3)' : 'none',
                        cursor: (hasAny && !busy) ? 'pointer' : 'not-allowed',
                      }}>
                {busy ? 'SENDING…' : 'SEND IT IN →'}
              </button>

              <button type="button" onClick={onSkip}
                      className="w-full text-sm underline"
                      style={{ color: 'rgba(255,255,255,0.55)' }}>
                Skip for now
              </button>
            </form>
          </div>
        </div>
      );
    };

    const ThanksView = ({ name, onReset }) => {
      const canShare = typeof navigator !== 'undefined' && !!navigator.share;
      const share = () => {
        if (!canShare) return;
        navigator.share({
          title: 'Live Healthy Chicago',
          text: `I just celebrated my blood pressure check — one more step toward a healthier Chicago.`,
          url: 'https://livehealthychi.com',
        }).catch(() => {});
      };
      return (
        <div className="view-enter relative min-h-[100dvh] flex flex-col items-center justify-center px-6 py-10">
          <FlagBackdrop />
          <div className="relative z-10 w-full max-w-md text-center">
            <div className="pop-in">
              <div className="flex justify-center mb-6" style={{ color: C.blueLt }}>
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z" />
                <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2" />
                <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2" />
                <path d="M10 6h4" /><path d="M10 10h4" /><path d="M10 14h4" /><path d="M10 18h4" />
              </svg>
            </div>
              <h2 className="font-heading font-black text-4xl sm:text-5xl mb-4" style={{ letterSpacing: '-0.02em' }}>
                You're in, {name}.
              </h2>
              <p className="text-lg mb-10" style={{ color: C.muted }}>
                Keep Chicago moving. Tell a friend to check their blood pressure this month.
              </p>
            </div>

            <div className="space-y-3">
              {canShare && (
                <button onClick={share}
                        className="w-full py-4 rounded-2xl font-heading font-extrabold text-base tracking-wide"
                        style={{ background: C.blue, color: C.white }}>
                  SHARE WITH A FRIEND
                </button>
              )}
              <a href="https://livehealthychi.com"
                 className="block w-full py-4 rounded-2xl font-heading font-extrabold text-base tracking-wide"
                 style={{ background: 'rgba(255,255,255,0.08)', border: `1px solid ${C.faint}`, color: C.white }}>
                LEARN MORE ABOUT THE COALITION
              </a>
              <button onClick={onReset}
                      className="text-sm underline mt-4"
                      style={{ color: 'rgba(255,255,255,0.55)' }}>
                Start over
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ── App ───────────────────────────────────────────────────────────
    const App = () => {
      const [view, setView] = useState('entry'); // entry | celebrate | impact | survey | thanks
      const [name, setName] = useState('');
      const [count, setCount] = useState(getCount());
      const [muted, setMuted] = useState(false);
      const loc = useMemo(getLoc, []);
      const locLabel = loc ? loc.replace(/[-_]/g, ' ') : '';

      const go = () => {
        const nm = name.trim();
        if (!nm) return;
        setName(nm);
        setCount(bumpCount());
        setView('celebrate');
        playFanfare(muted);
        fireConfetti('big');
      };

      const toImpact = useCallback(() => {
        setView('impact');
        playPing(muted);
      }, [muted]);

      const reset = () => {
        setName('');
        setView('entry');
      };

      return (
        <>
          <MuteButton muted={muted} setMuted={setMuted} />
          {view === 'entry'     && <EntryView     name={name} setName={setName} onGo={go} locLabel={locLabel} />}
          {view === 'celebrate' && <CelebrateView name={name} onNext={toImpact} />}
          {view === 'impact'    && <ImpactView    name={name} count={count}
                                                  onSurvey={() => setView('survey')}
                                                  onDone={() => setView('thanks')} />}
          {view === 'survey'    && <SurveyView    name={name} muted={muted}
                                                  onSubmit={() => { fireConfetti('small'); setView('thanks'); }}
                                                  onSkip={() => setView('thanks')} />}
          {view === 'thanks'    && <ThanksView    name={name} onReset={reset} />}
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
